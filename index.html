<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Мандра Харизанов</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="theme-color" content="#1a1a2e">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 20px;
    transition: background 0.3s, color 0.3s;
  }
  body.dark {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
  }
  body.light {
    background: linear-gradient(135deg, #e8f0fe 0%, #d4e4f7 50%, #c0d8f0 100%);
    color: #1a1a2e;
  }
  .theme-toggle {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(128,128,128,0.3);
    border: none;
    font-size: 1.6em;
    cursor: pointer;
    line-height: 1;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .header { text-align: center; padding: 20px 0; }
  .header h1 { font-size: 1.4em; font-weight: 300; opacity: 0.9; }
  .header .time { font-size: 0.85em; opacity: 0.6; margin-top: 5px; }
  .temp-main { text-align: center; padding: 30px 0; }
  .temp-main .value { font-size: 5em; font-weight: 200; line-height: 1; }
  .temp-main .unit { font-size: 0.4em; opacity: 0.6; vertical-align: super; }
  .temp-main .feels { font-size: 0.9em; opacity: 0.6; margin-top: 5px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto;
  }
  .dark .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .light .card {
    background: rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.05);
  }
  .card {
    border-radius: 16px;
    padding: 16px;
    backdrop-filter: blur(10px);
  }
  .card .label {
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-bottom: 8px;
  }
  .card .val { font-size: 1.6em; font-weight: 300; }
  .card .sub { font-size: 0.8em; opacity: 0.5; margin-top: 4px; }
  .section {
    max-width: 500px;
    margin: 24px auto 12px;
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.4;
  }
  table {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
    border-collapse: collapse;
  }
  th {
    font-size: 0.7em;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.4;
    text-align: left;
    padding: 8px 6px;
    font-weight: 400;
  }
  td {
    padding: 6px;
    font-size: 0.9em;
    font-weight: 300;
  }
  .dark td { border-top: 1px solid rgba(255,255,255,0.05); }
  .light td { border-top: 1px solid rgba(0,0,0,0.08); }
  .station-info { text-align: center; margin-top: 16px; font-size: 0.75em; opacity: 0.35; }
  .status { text-align: center; margin-top: 8px; font-size: 0.75em; opacity: 0.4; }
  .error { text-align: center; padding: 40px; color: #ff6b6b; }
  .loading { text-align: center; padding: 60px; opacity: 0.5; font-size: 1.2em; }
</style>
</head>
<body class="dark">

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Смяна на тема">&#9789;</button>

<div id="app">
  <div class="loading">Зареждане...</div>
</div>

<script>
const API_KEY = 'ad4163ac839d47328163ac839d1732f8';
const STATION_ID = 'IPOPOV26';

function toggleTheme() {
  const body = document.body;
  const btn = document.querySelector('.theme-toggle');
  if (body.classList.contains('dark')) {
    body.classList.replace('dark', 'light');
    btn.innerHTML = '&#9728;';
    localStorage.setItem('theme', 'light');
  } else {
    body.classList.replace('light', 'dark');
    btn.innerHTML = '&#9789;';
    localStorage.setItem('theme', 'dark');
  }
}

// Restore saved theme
const saved = localStorage.getItem('theme');
if (saved === 'light') {
  document.body.classList.replace('dark', 'light');
  document.querySelector('.theme-toggle').innerHTML = '&#9728;';
}

function windDirection(deg) {
  const dirs = [
    'Север','Север-североизток','Североизток','Изток-североизток',
    'Изток','Изток-югоизток','Югоизток','Юг-югоизток',
    'Юг','Юг-югозапад','Югозапад','Запад-югозапад',
    'Запад','Запад-северозапад','Северозапад','Север-северозапад'
  ];
  return dirs[Math.round(deg / 22.5) % 16];
}

function kmhToMs(kmh) {
  return (kmh / 3.6).toFixed(1);
}

function pad(n) { return String(n).padStart(2, '0'); }

function yyyymmdd(d) {
  return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate());
}

function fmtDate(s) {
  const d = new Date(s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6,8));
  return pad(d.getDate()) + '.' + pad(d.getMonth() + 1);
}

function fmtDateTime(d) {
  return pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + '.' + d.getFullYear() + ', ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

async function fetchYearHistory() {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const today = now;

  const chunks = [];
  const d = new Date(jan1);
  while (d < today) {
    const start = yyyymmdd(d);
    d.setDate(d.getDate() + 30);
    if (d > today) d.setTime(today.getTime());
    const end = yyyymmdd(d);
    chunks.push({ start, end });
    d.setDate(d.getDate() + 1);
  }

  const results = await Promise.all(chunks.map(async ({ start, end }) => {
    const url = `https://api.weather.com/v2/pws/history/daily?apiKey=${API_KEY}&stationId=${STATION_ID}&numericPrecision=decimal&format=json&units=m&startDate=${start}&endDate=${end}`;
    try {
      const res = await fetch(url);
      if (!res.ok) return [];
      const data = await res.json();
      return data.observations || [];
    } catch (e) { return []; }
  }));

  return results.flat().map(o => ({
    date: o.obsTimeLocal.slice(0, 10).replace(/-/g, ''),
    tempHigh: o.metric.tempHigh,
    tempLow: o.metric.tempLow,
    precipTotal: o.metric.precipTotal
  }));
}

function renderHistory(days) {
  if (days.length === 0) return '<div class="status">Няма исторически данни</div>';

  const now = new Date();
  const last7 = days.slice(-7);
  const last30 = days.slice(-30);

  const precip7 = last7.reduce((s, d) => s + (d.precipTotal || 0), 0);
  const precip30 = last30.reduce((s, d) => s + (d.precipTotal || 0), 0);
  const precipYear = days.reduce((s, d) => s + (d.precipTotal || 0), 0);

  let tableRows = '';
  for (const day of [...last7].reverse()) {
    tableRows += `
      <tr>
        <td>${fmtDate(day.date)}</td>
        <td>${day.tempLow.toFixed(1)}&deg;</td>
        <td>${day.tempHigh.toFixed(1)}&deg;</td>
        <td>${day.precipTotal.toFixed(1)} mm</td>
      </tr>`;
  }

  return `
    <div class="section">Валежи</div>
    <div class="grid-3">
      <div class="card">
        <div class="label">7 дни</div>
        <div class="val">${precip7.toFixed(1)}</div>
        <div class="sub">mm</div>
      </div>
      <div class="card">
        <div class="label">30 дни</div>
        <div class="val">${precip30.toFixed(1)}</div>
        <div class="sub">mm</div>
      </div>
      <div class="card">
        <div class="label">${now.getFullYear()} г.</div>
        <div class="val">${precipYear.toFixed(1)}</div>
        <div class="sub">mm</div>
      </div>
    </div>
    <div class="section">Последни 7 дни</div>
    <table>
      <tr><th>Дата</th><th>Мин</th><th>Макс</th><th>Валеж</th></tr>
      ${tableRows}
    </table>`;
}

async function fetchWeather() {
  try {
    const url = `https://api.weather.com/v2/pws/observations/current?apiKey=${API_KEY}&stationId=${STATION_ID}&numericPrecision=decimal&format=json&units=m`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const obs = data.observations[0];
    const m = obs.metric;
    const time = new Date(obs.obsTimeUtc);
    const timeStr = fmtDateTime(time);

    const historyEl = document.getElementById('history');
    const historyHtml = historyEl ? historyEl.innerHTML : '';

    document.getElementById('app').innerHTML = `
      <div class="header">
        <h1>Мандра Харизанов<br><small style="font-size:0.7em;opacity:0.6">с. Попович</small></h1>
        <div class="time">${timeStr}</div>
      </div>
      <div class="temp-main">
        <div class="value">${m.temp.toFixed(1)}<span class="unit">&deg;C</span></div>
        <div class="feels">Усеща се ${m.heatIndex !== m.temp ? m.heatIndex.toFixed(1) : m.windChill.toFixed(1)}&deg;C</div>
      </div>
      <div class="section">Текущи данни</div>
      <div class="grid">
        <div class="card">
          <div class="label">Влажност</div>
          <div class="val">${obs.humidity.toFixed(0)}%</div>
        </div>
        <div class="card">
          <div class="label">Точка на оросяване</div>
          <div class="val">${m.dewpt.toFixed(1)}&deg;C</div>
        </div>
        <div class="card">
          <div class="label">Вятър</div>
          <div class="val">${kmhToMs(m.windSpeed)} <small>m/s</small></div>
          <div class="sub">${windDirection(obs.winddir)} (${obs.winddir}&deg;)</div>
        </div>
        <div class="card">
          <div class="label">Порив</div>
          <div class="val">${kmhToMs(m.windGust)} <small>m/s</small></div>
        </div>
        <div class="card">
          <div class="label">Налягане</div>
          <div class="val">${m.pressure.toFixed(1)}</div>
          <div class="sub">hPa</div>
        </div>
        <div class="card">
          <div class="label">Валеж днес</div>
          <div class="val">${m.precipTotal.toFixed(1)} <small>mm</small></div>
          <div class="sub">${m.precipRate.toFixed(1)} mm/h сега</div>
        </div>
        <div class="card">
          <div class="label">UV индекс</div>
          <div class="val">${obs.uv.toFixed(1)}</div>
        </div>
        <div class="card">
          <div class="label">Слънчева радиация</div>
          <div class="val">${obs.solarRadiation !== null ? obs.solarRadiation.toFixed(1) : '—'}</div>
          <div class="sub">W/m&sup2;</div>
        </div>
      </div>
      <div id="history">${historyHtml}</div>
      <div class="station-info">
        Мандра Харизанов, с. Попович, БГ
      </div>
      <div class="status">Обновяване на всеки 60 сек</div>
    `;
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error">Грешка: ${e.message}</div>`;
  }
}

async function loadHistory() {
  const days = await fetchYearHistory();
  const el = document.getElementById('history');
  if (el) el.innerHTML = renderHistory(days);
}

fetchWeather();
loadHistory();
setInterval(fetchWeather, 60000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
