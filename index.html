<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Мандра Харизанов</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="theme-color" content="#1a1a2e">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    overscroll-behavior-y: contain;
    overflow-x: hidden;
  }
  body.dark {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
  }
  body.light {
    background: linear-gradient(135deg, #e8f0fe 0%, #d4e4f7 50%, #c0d8f0 100%);
    color: #1a1a2e;
  }
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(128,128,128,0.3);
    border: none;
    font-size: 1.6em;
    cursor: pointer;
    line-height: 1;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .slides {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .slides::-webkit-scrollbar { display: none; }
  .slide {
    width: 100vw;
    min-height: 100vh;
    padding: 20px;
    padding-bottom: 50px;
    flex-shrink: 0;
    scroll-snap-align: start;
  }
  .dots {
    position: fixed;
    bottom: 16px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    z-index: 10;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(128,128,128,0.4);
    transition: background 0.3s;
  }
  .dot.active { background: rgba(128,128,128,0.9); }
  .header { text-align: center; padding: 20px 0; }
  .header h1 { font-size: 1.4em; font-weight: 300; opacity: 0.9; }
  .header .time { font-size: 0.85em; opacity: 0.6; margin-top: 5px; }
  .header .ago { font-size: 0.75em; margin-top: 3px; }
  .header .ago.stale { color: #ff6b6b; }
  .temp-main { text-align: center; padding: 30px 0; }
  .temp-main .value { font-size: 5em; font-weight: 200; line-height: 1; }
  .temp-main .unit { font-size: 0.4em; opacity: 0.6; vertical-align: super; }
  .temp-main .feels { font-size: 0.9em; opacity: 0.6; margin-top: 5px; }
  .temp-main .minmax { font-size: 0.85em; opacity: 0.5; margin-top: 3px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto;
  }
  .dark .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .light .card {
    background: rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.05);
  }
  .card {
    border-radius: 16px;
    padding: 16px;
    backdrop-filter: blur(10px);
  }
  .card .label {
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-bottom: 8px;
  }
  .card .val { font-size: 1.6em; font-weight: 300; }
  .card .sub { font-size: 0.8em; opacity: 0.5; margin-top: 4px; }
  .section {
    max-width: 500px;
    margin: 24px auto 12px;
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.4;
  }
  table {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
    border-collapse: collapse;
  }
  th {
    font-size: 0.7em;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.4;
    text-align: left;
    padding: 8px 6px;
    font-weight: 400;
  }
  td {
    padding: 6px;
    font-size: 0.9em;
    font-weight: 300;
  }
  .dark td { border-top: 1px solid rgba(255,255,255,0.05); }
  .light td { border-top: 1px solid rgba(0,0,0,0.08); }
  .chart-container {
    max-width: 500px;
    margin: 12px auto;
    height: 120px;
    position: relative;
  }
  .chart-container canvas { width: 100%; height: 100%; }
  .station-info { text-align: center; margin-top: 16px; font-size: 0.75em; opacity: 0.35; }
  .status { text-align: center; margin-top: 8px; font-size: 0.75em; opacity: 0.4; }
  .error { text-align: center; padding: 40px; color: #ff6b6b; }
  .loading { text-align: center; padding: 60px; opacity: 0.5; font-size: 1.2em; }
  .pull-indicator {
    text-align: center;
    font-size: 0.8em;
    opacity: 0;
    transition: opacity 0.2s;
    height: 0;
    overflow: visible;
    position: fixed;
    top: 5px;
    left: 0;
    right: 0;
    z-index: 10;
  }
  .pull-indicator.visible { opacity: 0.5; }
  .forecast-day {
    max-width: 500px;
    margin: 0 auto;
    padding: 12px 0;
  }
  .dark .forecast-day + .forecast-day { border-top: 1px solid rgba(255,255,255,0.05); }
  .light .forecast-day + .forecast-day { border-top: 1px solid rgba(0,0,0,0.08); }
  .forecast-day .fc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .forecast-day .fc-date { font-weight: 400; }
  .forecast-day .fc-cond { font-size: 0.85em; opacity: 0.6; }
  .forecast-day .fc-details {
    display: flex;
    gap: 12px;
    margin-top: 4px;
    font-size: 0.8em;
    opacity: 0.5;
  }
  .hourly-scroll {
    max-width: 500px;
    margin: 12px auto;
    overflow-x: auto;
    white-space: nowrap;
    padding-bottom: 8px;
  }
  .hourly-item {
    display: inline-block;
    text-align: center;
    padding: 8px 10px;
    font-size: 0.8em;
    vertical-align: top;
  }
  .hourly-item .h-time { opacity: 0.5; font-size: 0.85em; }
  .hourly-item .h-temp { font-size: 1.1em; margin: 4px 0; }
  .hourly-item .h-rain { opacity: 0.5; font-size: 0.85em; }
</style>
</head>
<body class="dark">

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Смяна на тема">&#9789;</button>
<div class="pull-indicator" id="pullIndicator">&#8595; Дръпни за обновяване</div>

<div class="slides" id="slides">
  <div class="slide" id="slide0">
    <div id="forecast"><div class="loading">Зареждане на прогноза...</div></div>
  </div>
  <div class="slide" id="slide1">
    <div id="current0"><div class="loading">Зареждане...</div></div>
    <div id="history0"><div class="status">Зареждане на история...</div></div>
  </div>
  <div class="slide" id="slide2">
    <div id="current1"><div class="loading">Зареждане...</div></div>
    <div id="history1"><div class="status">Зареждане на история...</div></div>
  </div>
</div>

<div class="dots">
  <div class="dot" id="dot0"></div>
  <div class="dot active" id="dot1"></div>
  <div class="dot" id="dot2"></div>
</div>

<script>
const API_KEY = 'ad4163ac839d47328163ac839d1732f8';
const WEATHERAI_KEY = 'wapi_49023cb7bebb15637a895ed7ebd88d177bab0ff42fc14424';
const TOTAL_SLIDES = 3;

const STATIONS = [
  { id: 'IPOPOV26', name: 'Мандра Харизанов', subtitle: 'Попович' },
  { id: 'IOBZOR2', name: 'Морска Перла', subtitle: 'Обзор' }
];

// Scroll-snap navigation — dots update on scroll
const slidesEl = document.getElementById('slides');
let currentSlide = 0;

slidesEl.addEventListener('scroll', () => {
  const idx = Math.round(slidesEl.scrollLeft / window.innerWidth);
  if (idx !== currentSlide) {
    currentSlide = idx;
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === currentSlide);
    });
  }
});

// Pull to refresh
let pullStart = 0;
document.addEventListener('touchstart', e => {
  if (window.scrollY === 0) pullStart = e.touches[0].clientY;
  else pullStart = 0;
});
document.addEventListener('touchmove', e => {
  if (pullStart && e.touches[0].clientY - pullStart > 60) {
    document.getElementById('pullIndicator').classList.add('visible');
  }
});
document.addEventListener('touchend', () => {
  const indicator = document.getElementById('pullIndicator');
  if (indicator.classList.contains('visible')) {
    indicator.classList.remove('visible');
    refreshAll();
  }
  pullStart = 0;
});

// Theme
function toggleTheme() {
  const body = document.body;
  const btn = document.querySelector('.theme-toggle');
  if (body.classList.contains('dark')) {
    body.classList.replace('dark', 'light');
    btn.innerHTML = '&#9728;';
    localStorage.setItem('theme', 'light');
  } else {
    body.classList.replace('light', 'dark');
    btn.innerHTML = '&#9789;';
    localStorage.setItem('theme', 'dark');
  }
  STATIONS.forEach((st, i) => {
    const canvas = document.getElementById(`tempChart${i}`);
    if (canvas && canvas._days) drawChart(`tempChart${i}`, canvas._days);
  });
}
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') {
  document.body.classList.replace('dark', 'light');
  document.querySelector('.theme-toggle').innerHTML = '&#9728;';
}

// Helpers
function windDirection(deg) {
  const dirs = [
    'Север','Север-североизток','Североизток','Изток-североизток',
    'Изток','Изток-югоизток','Югоизток','Юг-югоизток',
    'Юг','Юг-югозапад','Югозапад','Запад-югозапад',
    'Запад','Запад-северозапад','Северозапад','Север-северозапад'
  ];
  return dirs[Math.round(deg / 22.5) % 16];
}
function kmhToMs(kmh) { return (kmh / 3.6).toFixed(1); }
function pad(n) { return String(n).padStart(2, '0'); }
function yyyymmdd(d) { return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()); }
function fmtDate(s) { return s.slice(6,8) + '.' + s.slice(4,6); }
function fmtDateTime(d) {
  return pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + '.' + d.getFullYear() + ', ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function timeAgo(date) {
  const mins = Math.floor((Date.now() - date.getTime()) / 60000);
  if (mins < 1) return 'току-що';
  if (mins < 60) return `преди ${mins} мин`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `преди ${hours} ч`;
  return `преди ${Math.floor(hours / 24)} дни`;
}
function pressureArrow(trend) {
  if (trend > 0.5) return ' &#8593;';
  if (trend < -0.5) return ' &#8595;';
  return ' &#8594;';
}
function dayName(dateStr) {
  const days = ['Неделя','Понеделник','Вторник','Сряда','Четвъртък','Петък','Събота'];
  return days[new Date(dateStr).getDay()];
}
function conditionBg(text) {
  const t = text.toLowerCase();
  if (t.includes('rain') || t.includes('drizzle')) return '&#127783;';
  if (t.includes('snow')) return '&#127784;';
  if (t.includes('thunder')) return '&#9889;';
  if (t.includes('cloud') || t.includes('overcast')) return '&#9729;';
  if (t.includes('partly')) return '&#9925;';
  if (t.includes('fog') || t.includes('mist')) return '&#127787;';
  return '&#9728;';
}

// Per-station data
const stationData = STATIONS.map(() => ({ summary: null }));

async function fetchTodaySummary(idx) {
  const st = STATIONS[idx];
  try {
    const url = `https://api.weather.com/v2/pws/dailysummary/7day?apiKey=${API_KEY}&stationId=${st.id}&numericPrecision=decimal&format=json&units=m`;
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    const today = new Date().toISOString().slice(0, 10);
    stationData[idx].summary = data.summaries.find(s => s.obsTimeLocal.startsWith(today)) || data.summaries[data.summaries.length - 1];
  } catch (e) {}
}

async function fetchWeather(idx) {
  const st = STATIONS[idx];
  const summary = stationData[idx].summary;
  try {
    const url = `https://api.weather.com/v2/pws/observations/current?apiKey=${API_KEY}&stationId=${st.id}&numericPrecision=decimal&format=json&units=m`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const obs = data.observations[0];
    const m = obs.metric;
    const time = new Date(obs.obsTimeUtc);
    const timeStr = fmtDateTime(time);
    const stale = (Date.now() - time.getTime()) > 30 * 60000;
    const pTrend = summary ? pressureArrow(summary.metric.pressureTrend) : '';

    document.getElementById(`current${idx}`).innerHTML = `
      <div class="header">
        <h1>${st.name}${st.subtitle ? `<br><small style="font-size:0.7em;opacity:0.6">${st.subtitle}</small>` : ''}</h1>
        <div class="time">${timeStr}</div>
        ${stale ? `<div class="ago stale">&#9888; Няма данни от ${timeAgo(time)}</div>` : ''}
      </div>
      <div class="temp-main">
        <div class="value">${m.temp.toFixed(1)}<span class="unit">&deg;C</span></div>
        <div class="feels">Усеща се ${m.heatIndex !== m.temp ? m.heatIndex.toFixed(1) : m.windChill.toFixed(1)}&deg;C</div>
        ${summary ? `<div class="minmax">&#9661; ${Math.min(summary.metric.tempLow, m.temp).toFixed(1)}&deg; &nbsp; &#9651; ${Math.max(summary.metric.tempHigh, m.temp).toFixed(1)}&deg;</div>` : ''}
      </div>
      <div class="section">Текущи данни</div>
      <div class="grid">
        <div class="card">
          <div class="label">Влажност</div>
          <div class="val">${obs.humidity.toFixed(0)}%</div>
        </div>
        <div class="card">
          <div class="label">Оросяване</div>
          <div class="val">${m.dewpt.toFixed(1)}&deg;C</div>
        </div>
        <div class="card">
          <div class="label">Вятър</div>
          <div class="val">${kmhToMs(m.windSpeed)} <small>m/s</small></div>
          <div class="sub">${windDirection(obs.winddir)} (${obs.winddir}&deg;)</div>
        </div>
        <div class="card">
          <div class="label">Порив</div>
          <div class="val">${kmhToMs(m.windGust)} <small>m/s</small></div>
        </div>
        <div class="card">
          <div class="label">Налягане</div>
          <div class="val">${m.pressure.toFixed(1)}${pTrend}</div>
          <div class="sub">hPa</div>
        </div>
        <div class="card">
          <div class="label">Валеж днес</div>
          <div class="val">${m.precipTotal.toFixed(1)} <small>mm</small></div>
          <div class="sub">${m.precipRate.toFixed(1)} mm/h сега</div>
        </div>
        <div class="card">
          <div class="label">UV индекс</div>
          <div class="val">${obs.uv.toFixed(1)}</div>
        </div>
        <div class="card">
          <div class="label">Радиация</div>
          <div class="val">${obs.solarRadiation !== null ? obs.solarRadiation.toFixed(1) : '—'}</div>
          <div class="sub">W/m&sup2;</div>
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById(`current${idx}`).innerHTML = `<div class="error">Грешка: ${e.message}</div>`;
  }
}

// History
async function fetchYearHistory(stationId) {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const today = now;

  const chunks = [];
  const d = new Date(jan1);
  while (d < today) {
    const start = yyyymmdd(d);
    d.setDate(d.getDate() + 30);
    if (d > today) d.setTime(today.getTime());
    const end = yyyymmdd(d);
    chunks.push({ start, end });
    d.setDate(d.getDate() + 1);
  }

  const results = await Promise.all(chunks.map(async ({ start, end }) => {
    const url = `https://api.weather.com/v2/pws/history/daily?apiKey=${API_KEY}&stationId=${stationId}&numericPrecision=decimal&format=json&units=m&startDate=${start}&endDate=${end}`;
    try {
      const res = await fetch(url);
      if (!res.ok) return [];
      const data = await res.json();
      return data.observations || [];
    } catch (e) { return []; }
  }));

  return results.flat().map(o => ({
    date: o.obsTimeLocal.slice(0, 10).replace(/-/g, ''),
    tempHigh: o.metric.tempHigh,
    tempLow: o.metric.tempLow,
    precipTotal: o.metric.precipTotal
  }));
}

function drawChart(canvasId, days) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || days.length < 2) return;
  canvas._days = days;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pl = 35, pr = 10, pt = 10, pb = 25;
  const cw = w - pl - pr, ch = h - pt - pb;

  const allTemps = days.flatMap(d => [d.tempLow, d.tempHigh]);
  const tMin = Math.floor(Math.min(...allTemps)) - 1;
  const tMax = Math.ceil(Math.max(...allTemps)) + 1;
  const tRange = tMax - tMin || 1;

  const isDark = document.body.classList.contains('dark');
  const textColor = isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.4)';
  const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';

  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  for (let t = Math.ceil(tMin); t <= Math.floor(tMax); t += Math.ceil(tRange / 4)) {
    const y = pt + ch - ((t - tMin) / tRange) * ch;
    ctx.beginPath(); ctx.moveTo(pl, y); ctx.lineTo(w - pr, y); ctx.stroke();
    ctx.fillStyle = textColor; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(t + '°', pl - 5, y + 4);
  }

  ctx.fillStyle = textColor; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  days.forEach((d, i) => {
    const x = pl + (i / (days.length - 1)) * cw;
    ctx.fillText(fmtDate(d.date), x, h - 5);
  });

  ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth = 2; ctx.beginPath();
  days.forEach((d, i) => {
    const x = pl + (i / (days.length - 1)) * cw;
    const y = pt + ch - ((d.tempHigh - tMin) / tRange) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.strokeStyle = '#4dabf7'; ctx.beginPath();
  days.forEach((d, i) => {
    const x = pl + (i / (days.length - 1)) * cw;
    const y = pt + ch - ((d.tempLow - tMin) / tRange) * ch;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  days.forEach((d, i) => {
    const x = pl + (i / (days.length - 1)) * cw;
    ctx.fillStyle = '#ff6b6b';
    ctx.beginPath(); ctx.arc(x, pt + ch - ((d.tempHigh - tMin) / tRange) * ch, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#4dabf7';
    ctx.beginPath(); ctx.arc(x, pt + ch - ((d.tempLow - tMin) / tRange) * ch, 3, 0, Math.PI * 2); ctx.fill();
  });
}

function renderHistory(days, idx) {
  if (days.length === 0) return '<div class="status">Няма исторически данни</div>';

  const now = new Date();
  const last7 = days.slice(-7);
  const last30 = days.slice(-30);

  const precip7 = last7.reduce((s, d) => s + (d.precipTotal || 0), 0);
  const precip30 = last30.reduce((s, d) => s + (d.precipTotal || 0), 0);
  const precipYear = days.reduce((s, d) => s + (d.precipTotal || 0), 0);

  let tableRows = '';
  for (const day of [...last7].reverse()) {
    tableRows += `
      <tr>
        <td>${fmtDate(day.date)}</td>
        <td>${day.tempLow.toFixed(1)}&deg;</td>
        <td>${day.tempHigh.toFixed(1)}&deg;</td>
        <td>${day.precipTotal.toFixed(1)} mm</td>
      </tr>`;
  }

  return `
    <div class="section">Валежи</div>
    <div class="grid-3">
      <div class="card">
        <div class="label">7 дни</div>
        <div class="val">${precip7.toFixed(1)}</div>
        <div class="sub">mm</div>
      </div>
      <div class="card">
        <div class="label">30 дни</div>
        <div class="val">${precip30.toFixed(1)}</div>
        <div class="sub">mm</div>
      </div>
      <div class="card">
        <div class="label">${now.getFullYear()} г.</div>
        <div class="val">${precipYear.toFixed(1)}</div>
        <div class="sub">mm</div>
      </div>
    </div>
    <div class="section">Последни 7 дни</div>
    <table>
      <tr><th>Дата</th><th>Мин</th><th>Макс</th><th>Валеж</th></tr>
      ${tableRows}
    </table>
    <div class="section">Температура — 7 дни</div>
    <div class="chart-container">
      <canvas id="tempChart${idx}" style="width:100%;height:100%"></canvas>
    </div>
    <div style="max-width:500px;margin:6px auto 0;display:flex;gap:16px;justify-content:center;font-size:0.75em;opacity:0.5">
      <span><span style="color:#ff6b6b">&#9644;</span> Макс</span>
      <span><span style="color:#4dabf7">&#9644;</span> Мин</span>
    </div>
    <div style="height:40px"></div>`;
}

// Forecast
async function fetchForecast() {
  try {
    const res = await fetch('https://api.weatherai.io/v1/forecast?q=42.8326,27.7999&days=14', {
      headers: { 'X-API-Key': WEATHERAI_KEY }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const today = data.forecast[0];
    const hourlyNow = today.hourly || [];

    // Today's hourly from current hour onwards
    const currentHour = new Date().getHours();
    const upcomingHours = hourlyNow.filter(h => {
      const hh = parseInt(h.time.slice(11, 13));
      return hh >= currentHour;
    });
    // Add tomorrow's hours if we have them
    if (data.forecast[1] && data.forecast[1].hourly) {
      upcomingHours.push(...data.forecast[1].hourly.slice(0, 12 - upcomingHours.length));
    }

    let hourlyHtml = '';
    for (const h of upcomingHours.slice(0, 12)) {
      const hh = h.time.slice(11, 16);
      hourlyHtml += `
        <div class="hourly-item">
          <div class="h-time">${hh}</div>
          <div>${conditionBg(h.condition.text)}</div>
          <div class="h-temp">${h.temperature.celsius.toFixed(0)}&deg;</div>
          <div class="h-rain">${h.chanceOfRain}%</div>
        </div>`;
    }

    let daysHtml = '';
    for (const day of data.forecast) {
      const d = day.date;
      const dn = dayName(d);
      const dd = pad(new Date(d).getDate()) + '.' + pad(new Date(d).getMonth() + 1);
      daysHtml += `
        <div class="forecast-day">
          <div class="fc-header">
            <span class="fc-date">${dn}, ${dd}</span>
            <span>${conditionBg(day.condition.text)} ${day.temperature.min.celsius.toFixed(0)}&deg; / ${day.temperature.max.celsius.toFixed(0)}&deg;</span>
          </div>
          <div class="fc-details">
            <span>&#127783; ${day.precipitation.chanceOfRain}%</span>
            <span>${day.precipitation.mm.toFixed(1)} mm</span>
            <span>&#128168; ${kmhToMs(day.wind.max.kph)} m/s</span>
            <span>&#9728; ${day.uv.toFixed(0)} UV</span>
          </div>
        </div>`;
    }

    document.getElementById('forecast').innerHTML = `
      <div class="header">
        <h1>Прогноза<br><small style="font-size:0.7em;opacity:0.6">Попович</small></h1>
      </div>
      <div class="section">Следващи часове</div>
      <div class="hourly-scroll">${hourlyHtml}</div>
      <div class="section">14-дневна прогноза</div>
      ${daysHtml}
      <div style="height:40px"></div>
    `;
  } catch (e) {
    document.getElementById('forecast').innerHTML = `<div class="error">Грешка: ${e.message}</div>`;
  }
}

async function loadStation(idx) {
  await fetchTodaySummary(idx);
  fetchWeather(idx);
  const days = await fetchYearHistory(STATIONS[idx].id);
  const el = document.getElementById(`history${idx}`);
  if (el) {
    el.innerHTML = renderHistory(days, idx);
    const last7 = days.slice(-7);
    if (last7.length >= 2) drawChart(`tempChart${idx}`, last7);
  }
}

async function refreshAll() {
  STATIONS.forEach((_, i) => loadStation(i));
  fetchForecast();
}

// Initial load — start on middle slide (Попович)
slidesEl.scrollLeft = window.innerWidth;
refreshAll();
setInterval(() => {
  STATIONS.forEach(async (_, i) => {
    await fetchTodaySummary(i);
    fetchWeather(i);
  });
}, 60000);
// Refresh forecast every 30 min
setInterval(fetchForecast, 30 * 60000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
