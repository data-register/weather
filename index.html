<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Метеостанция Попович</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<meta name="theme-color" content="#1a1a2e">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    text-align: center;
    padding: 20px 0;
  }
  .header h1 { font-size: 1.4em; font-weight: 300; opacity: 0.9; }
  .header .time { font-size: 0.85em; opacity: 0.6; margin-top: 5px; }
  .header .coords {
    font-size: 0.75em;
    opacity: 0.4;
    margin-top: 3px;
  }
  .temp-main {
    text-align: center;
    padding: 30px 0;
  }
  .temp-main .value {
    font-size: 5em;
    font-weight: 200;
    line-height: 1;
  }
  .temp-main .unit { font-size: 0.4em; opacity: 0.6; vertical-align: super; }
  .temp-main .feels {
    font-size: 0.9em;
    opacity: 0.6;
    margin-top: 5px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .card .label {
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-bottom: 8px;
  }
  .card .val {
    font-size: 1.6em;
    font-weight: 300;
  }
  .card .sub {
    font-size: 0.8em;
    opacity: 0.5;
    margin-top: 4px;
  }
  .section-title {
    max-width: 500px;
    margin: 24px auto 12px;
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.4;
  }
  .history-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto;
  }
  .history-table {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
    border-collapse: collapse;
  }
  .history-table th {
    font-size: 0.7em;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.4;
    text-align: left;
    padding: 8px 6px;
    font-weight: 400;
  }
  .history-table td {
    padding: 6px;
    font-size: 0.9em;
    font-weight: 300;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .station-info {
    text-align: center;
    margin-top: 16px;
    font-size: 0.75em;
    opacity: 0.35;
  }
  .status {
    text-align: center;
    margin-top: 8px;
    font-size: 0.75em;
    opacity: 0.4;
  }
  .error {
    text-align: center;
    padding: 40px;
    color: #ff6b6b;
  }
  .loading {
    text-align: center;
    padding: 60px;
    opacity: 0.5;
    font-size: 1.2em;
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading">Зареждане...</div>
</div>

<script>
const API_KEY = 'ad4163ac839d47328163ac839d1732f8';
const STATION_ID = 'IPOPOV26';
const CURRENT_URL = `https://api.weather.com/v2/pws/observations/current?apiKey=${API_KEY}&stationId=${STATION_ID}&numericPrecision=decimal&format=json&units=m`;

function windDirection(deg) {
  const dirs = [
    'Север','Север-североизток','Североизток','Изток-североизток',
    'Изток','Изток-югоизток','Югоизток','Юг-югоизток',
    'Юг','Юг-югозапад','Югозапад','Запад-югозапад',
    'Запад','Запад-северозапад','Северозапад','Север-северозапад'
  ];
  return dirs[Math.round(deg / 22.5) % 16];
}

function kmhToMs(kmh) {
  return (kmh / 3.6).toFixed(1);
}

function dateStr(d) {
  return d.toISOString().slice(0, 10).replace(/-/g, '');
}

function formatDate(yyyymmdd) {
  const d = new Date(yyyymmdd.slice(0,4) + '-' + yyyymmdd.slice(4,6) + '-' + yyyymmdd.slice(6,8));
  return d.toLocaleDateString('bg-BG', { day: 'numeric', month: 'short' });
}

// Fetch daily history for a specific date, with localStorage cache
async function fetchDay(yyyymmdd) {
  const key = `wx_${yyyymmdd}`;
  const cached = localStorage.getItem(key);
  if (cached) return JSON.parse(cached);

  const url = `https://api.weather.com/v2/pws/history/daily?apiKey=${API_KEY}&stationId=${STATION_ID}&numericPrecision=decimal&format=json&units=m&date=${yyyymmdd}`;
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    if (data.observations && data.observations.length > 0) {
      const obs = data.observations[0];
      const summary = {
        date: yyyymmdd,
        tempHigh: obs.metric.tempHigh,
        tempLow: obs.metric.tempLow,
        tempAvg: obs.metric.tempAvg,
        precipTotal: obs.metric.precipTotal,
        humidityAvg: obs.humidityAvg,
        windspeedAvg: obs.metric.windspeedAvg
      };
      // Cache past days (not today — today's data is incomplete)
      const today = dateStr(new Date());
      if (yyyymmdd !== today) {
        localStorage.setItem(key, JSON.stringify(summary));
      }
      return summary;
    }
  } catch (e) {}
  return null;
}

// Fetch history with rate-limit-friendly sequential loading
async function fetchHistory() {
  const now = new Date();
  const today = dateStr(now);
  const jan1 = now.getFullYear() + '0101';

  // Build list of dates from Jan 1 to yesterday
  const dates = [];
  const d = new Date(now.getFullYear(), 0, 1);
  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);

  while (d <= yesterday) {
    dates.push(dateStr(d));
    d.setDate(d.getDate() + 1);
  }

  // Fetch all days, cached ones return instantly
  const results = [];
  for (const dt of dates) {
    const r = await fetchDay(dt);
    if (r) results.push(r);
    // Small delay for uncached requests to avoid rate limiting
    if (!localStorage.getItem(`wx_${dt}`)) {
      await new Promise(ok => setTimeout(ok, 300));
    }
  }

  return results;
}

function renderHistory(days) {
  if (days.length === 0) return '<div class="status">Няма исторически данни</div>';

  const now = new Date();
  const today = dateStr(now);

  // Last 7 days
  const last7 = days.slice(-7);
  const last30 = days.slice(-30);

  const precip7 = last7.reduce((s, d) => s + (d.precipTotal || 0), 0);
  const precip30 = last30.reduce((s, d) => s + (d.precipTotal || 0), 0);
  const precipYear = days.reduce((s, d) => s + (d.precipTotal || 0), 0);

  const tempMin7 = Math.min(...last7.map(d => d.tempLow));
  const tempMax7 = Math.max(...last7.map(d => d.tempHigh));

  let html = `
    <div class="section-title">Валежи</div>
    <div class="history-grid">
      <div class="card">
        <div class="label">7 дни</div>
        <div class="val">${precip7.toFixed(1)}</div>
        <div class="sub">mm</div>
      </div>
      <div class="card">
        <div class="label">30 дни</div>
        <div class="val">${precip30.toFixed(1)}</div>
        <div class="sub">mm</div>
      </div>
      <div class="card">
        <div class="label">${now.getFullYear()} г.</div>
        <div class="val">${precipYear.toFixed(1)}</div>
        <div class="sub">mm</div>
      </div>
    </div>

    <div class="section-title">Последни 7 дни</div>
    <table class="history-table">
      <tr>
        <th>Дата</th>
        <th>Мин</th>
        <th>Макс</th>
        <th>Валеж</th>
      </tr>
  `;

  for (const day of last7.reverse()) {
    html += `
      <tr>
        <td>${formatDate(day.date)}</td>
        <td>${day.tempLow.toFixed(1)}&deg;</td>
        <td>${day.tempHigh.toFixed(1)}&deg;</td>
        <td>${day.precipTotal.toFixed(1)} mm</td>
      </tr>
    `;
  }

  html += '</table>';
  return html;
}

async function fetchWeather() {
  try {
    const res = await fetch(CURRENT_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const obs = data.observations[0];
    const m = obs.metric;
    const time = new Date(obs.obsTimeUtc);
    const timeStr = time.toLocaleString('bg-BG', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' });

    const historyHtml = document.getElementById('history')
      ? document.getElementById('history').innerHTML
      : '<div class="status">Зареждане на история...</div>';

    document.getElementById('app').innerHTML = `
      <div class="header">
        <h1>Попович</h1>
        <div class="time">${timeStr}</div>
        <div class="coords">${obs.lat.toFixed(4)}°N, ${obs.lon.toFixed(4)}°E</div>
      </div>
      <div class="temp-main">
        <div class="value">${m.temp.toFixed(1)}<span class="unit">&deg;C</span></div>
        <div class="feels">Усеща се ${m.heatIndex !== m.temp ? m.heatIndex.toFixed(1) : m.windChill.toFixed(1)}&deg;C</div>
      </div>
      <div class="section-title">Текущи данни</div>
      <div class="grid">
        <div class="card">
          <div class="label">Влажност</div>
          <div class="val">${obs.humidity.toFixed(0)}%</div>
        </div>
        <div class="card">
          <div class="label">Точка на оросяване</div>
          <div class="val">${m.dewpt.toFixed(1)}&deg;C</div>
        </div>
        <div class="card">
          <div class="label">Вятър</div>
          <div class="val">${kmhToMs(m.windSpeed)} <small>m/s</small></div>
          <div class="sub">${windDirection(obs.winddir)} (${obs.winddir}&deg;)</div>
        </div>
        <div class="card">
          <div class="label">Порив</div>
          <div class="val">${kmhToMs(m.windGust)} <small>m/s</small></div>
        </div>
        <div class="card">
          <div class="label">Налягане</div>
          <div class="val">${m.pressure.toFixed(1)}</div>
          <div class="sub">hPa</div>
        </div>
        <div class="card">
          <div class="label">Валеж днес</div>
          <div class="val">${m.precipTotal.toFixed(1)} <small>mm</small></div>
          <div class="sub">${m.precipRate.toFixed(1)} mm/h сега</div>
        </div>
        <div class="card">
          <div class="label">UV индекс</div>
          <div class="val">${obs.uv.toFixed(1)}</div>
        </div>
        <div class="card">
          <div class="label">Слънчева радиация</div>
          <div class="val">${obs.solarRadiation !== null ? obs.solarRadiation.toFixed(1) : '—'}</div>
          <div class="sub">W/m&sup2;</div>
        </div>
      </div>
      <div id="history">${historyHtml}</div>
      <div class="station-info">
        Станция: ${obs.stationID} | ${obs.neighborhood}, ${obs.country}
      </div>
      <div class="status">Обновяване на всеки 60 сек</div>
    `;
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error">Грешка: ${e.message}</div>`;
  }
}

async function loadHistory() {
  const days = await fetchHistory();
  const el = document.getElementById('history');
  if (el) el.innerHTML = renderHistory(days);
}

fetchWeather();
loadHistory();
setInterval(fetchWeather, 60000);
// Reload history every 30 minutes
setInterval(loadHistory, 30 * 60000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
